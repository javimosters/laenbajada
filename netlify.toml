# ══════════════════════════════════════════════════════════
#  La Enbajada — netlify.toml v2
#  Seguridad + Performance — actualizado junio 2026
# ══════════════════════════════════════════════════════════

[build]
  publish = "."
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[build.environment]
  NODE_VERSION = "20"

# ── Edge Function: OG tags para bots sociales ──
[[edge_functions]]
  path = "/articulo.html"
  function = "og"

[[edge_functions]]
  path = "/secciones/:tag/:slug"
  function = "og"

[[edge_functions]]
  path = "/historias/:slug"
  function = "og"

[[edge_functions]]
  path = "/sobre/equipo/:slug"
  function = "og"

[[edge_functions]]
  path = "/ediciones/:num"
  function = "og"

# ── Edge Function: Sitemap dinámico ──
[[edge_functions]]
  path = "/sitemap.xml"
  function = "sitemap"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ── Admin — sin caché, sin indexación ──
[[headers]]
  for = "/admin.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, private"
    Pragma = "no-cache"
    X-Robots-Tag = "noindex, nofollow, noarchive"

# ── Assets JS/CSS — caché larga ──
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── HTML — siempre fresco ──
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"